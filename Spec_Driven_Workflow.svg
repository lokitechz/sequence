<svg width="1000" height="400" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Spec-Driven Development Three-Phase Workflow</title>
  <desc>Three-phase workflow diagram showing progression from Requirements through Design to Tasks in Kiro's Spec-Driven Development methodology</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="500" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#2C2C2A" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">Spec-Driven Development Workflow</text>

  <!-- PHASE 1: REQUIREMENTS (Teal) -->
  <g>
    <rect x="55" y="65" width="270" height="300" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="75" y="85" width="80" height="22" rx="11" fill="#0F6E56"/>
    <text x="115" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif" letter-spacing="1">PHASE 1</text>
    <text x="75" y="140" font-size="22" font-weight="700" fill="#085041" font-family="Arial, sans-serif" letter-spacing="0.5">REQUIREMENTS</text>
    <line x1="75" y1="158" x2="305" y2="158" stroke="#0F6E56" stroke-width="1" opacity="0.25"/>

    <circle cx="82" cy="188" r="3" fill="#0F6E56"/>
    <text x="93" y="192" font-size="14" fill="#085041" font-family="Arial, sans-serif">User stories</text>

    <circle cx="82" cy="218" r="3" fill="#0F6E56"/>
    <text x="93" y="222" font-size="14" fill="#085041" font-family="Arial, sans-serif">Acceptance criteria (EARS)</text>

    <circle cx="82" cy="248" r="3" fill="#0F6E56"/>
    <text x="93" y="252" font-size="14" fill="#085041" font-family="Arial, sans-serif">Assumptions</text>

    <line x1="75" y1="298" x2="305" y2="298" stroke="#0F6E56" stroke-width="1" opacity="0.25"/>

    <rect x="75" y="312" width="230" height="36" rx="6" fill="#0F6E56" fill-opacity="0.12"/>
    <text x="85" y="335" font-size="13" font-family="'Courier New', Courier, monospace" fill="#085041" font-weight="700">→ requirements.md</text>
  </g>

  <line x1="330" y1="215" x2="360" y2="215" stroke="#5F5E5A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PHASE 2: DESIGN (Purple) -->
  <g>
    <rect x="365" y="65" width="270" height="300" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
    <rect x="385" y="85" width="80" height="22" rx="11" fill="#534AB7"/>
    <text x="425" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif" letter-spacing="1">PHASE 2</text>
    <text x="385" y="140" font-size="22" font-weight="700" fill="#3C3489" font-family="Arial, sans-serif" letter-spacing="0.5">DESIGN</text>
    <line x1="385" y1="158" x2="615" y2="158" stroke="#534AB7" stroke-width="1" opacity="0.25"/>

    <circle cx="392" cy="183" r="3" fill="#534AB7"/>
    <text x="403" y="187" font-size="14" fill="#3C3489" font-family="Arial, sans-serif">Architecture</text>

    <circle cx="392" cy="210" r="3" fill="#534AB7"/>
    <text x="403" y="214" font-size="14" fill="#3C3489" font-family="Arial, sans-serif">Sequence diagrams</text>

    <circle cx="392" cy="237" r="3" fill="#534AB7"/>
    <text x="403" y="241" font-size="14" fill="#3C3489" font-family="Arial, sans-serif">Data models</text>

    <circle cx="392" cy="264" r="3" fill="#534AB7"/>
    <text x="403" y="268" font-size="14" fill="#3C3489" font-family="Arial, sans-serif">Tech stack</text>

    <line x1="385" y1="298" x2="615" y2="298" stroke="#534AB7" stroke-width="1" opacity="0.25"/>

    <rect x="385" y="312" width="230" height="36" rx="6" fill="#534AB7" fill-opacity="0.12"/>
    <text x="395" y="335" font-size="13" font-family="'Courier New', Courier, monospace" fill="#3C3489" font-weight="700">→ design.md</text>
  </g>

  <line x1="640" y1="215" x2="670" y2="215" stroke="#5F5E5A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PHASE 3: TASKS (Coral) -->
  <g>
    <rect x="675" y="65" width="270" height="300" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
    <rect x="695" y="85" width="80" height="22" rx="11" fill="#993C1D"/>
    <text x="735" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF" font-family="Arial, sans-serif" letter-spacing="1">PHASE 3</text>
    <text x="695" y="140" font-size="22" font-weight="700" fill="#712B13" font-family="Arial, sans-serif" letter-spacing="0.5">TASKS</text>
    <line x1="695" y1="158" x2="925" y2="158" stroke="#993C1D" stroke-width="1" opacity="0.25"/>

    <circle cx="702" cy="183" r="3" fill="#993C1D"/>
    <text x="713" y="187" font-size="14" fill="#712B13" font-family="Arial, sans-serif">Task breakdown</text>

    <circle cx="702" cy="210" r="3" fill="#993C1D"/>
    <text x="713" y="214" font-size="14" fill="#712B13" font-family="Arial, sans-serif">Dependency sequencing</text>

    <circle cx="702" cy="237" r="3" fill="#993C1D"/>
    <text x="713" y="241" font-size="14" fill="#712B13" font-family="Arial, sans-serif">Test generation</text>

    <circle cx="702" cy="264" r="3" fill="#993C1D"/>
    <text x="713" y="268" font-size="14" fill="#712B13" font-family="Arial, sans-serif">Progress tracking</text>

    <line x1="695" y1="298" x2="925" y2="298" stroke="#993C1D" stroke-width="1" opacity="0.25"/>

    <rect x="695" y="312" width="230" height="36" rx="6" fill="#993C1D" fill-opacity="0.12"/>
    <text x="705" y="335" font-size="13" font-family="'Courier New', Courier, monospace" fill="#712B13" font-weight="700">→ tasks.md</text>
  </g>
</svg>
